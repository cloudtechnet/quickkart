version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: quickkart_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: quickkart_root
      MYSQL_DATABASE: quickkart_db
      MYSQL_USER: quickkart_user
      MYSQL_PASSWORD: quickkart_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: ./backend
    container_name: quickkart_backend
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: quickkart_user
      DB_PASSWORD: quickkart_pass
      DB_NAME: quickkart_db
      JWT_SECRET: quickkart_super_secret_jwt_key_2024
      PORT: 5000
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: quickkart_frontend
    restart: always
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mysql_data:
